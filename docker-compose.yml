version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  api:
    build:
      context: .
      dockerfile: api_engine/Dockerfile
    container_name: fraud_api
    ports:
    - "8001:8000"   # API

    volumes:
      - ./models:/app/models
    restart: always

  ui:
    build:
      context: ./app_ui
      dockerfile: Dockerfile
    container_name: fraud_ui
    ports:
      - "5001:5000"
    depends_on:
      - api
    restart: always