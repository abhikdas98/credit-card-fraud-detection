services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      JVMFLAGS: "-Xms128M -Xmx256M"

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    depends_on:
      - zookeeper:
        conditions: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms128M -Xmx256M"

  api:
    build:
      context: .
      dockerfile: api_engine/Dockerfile
    container_name: fraud_api
    ports:
      - "8001:8000"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONPATH=/app

  ui:
    build:
      context: ./app_ui
    container_name: fraud_ui
    ports:
      - "5001:5000"

  producer:
    build:
      context: .
      dockerfile: api_engine/Dockerfile
    container_name: fraud_producer
    command: ["python", "kafka/producer.py"]
    volumes:
      - ./data:/app/data
    depends_on:
      - kafka
    environment:
      - PYTHONPATH=/app

  consumer:
    build:
      context: .
      dockerfile: api_engine/Dockerfile
    container_name: fraud_consumer
    command: ["python", "kafka/consumer.py"]
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - kafka
    environment:
      - PYTHONPATH=/app