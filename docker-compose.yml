version: "3.8"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xms128M -Xmx256M"

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # ✅ FIXED (single listener → no port conflict)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms128M -Xmx256M"

  api:
    build:
      context: .
      dockerfile: api_engine/Dockerfile
    container_name: fraud_api
    ports:
      - "8001:8000"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONPATH=/app
    depends_on:
      - kafka

  ui:
    build:
      context: ./app_ui
    container_name: fraud_ui
    ports:
      - "5001:5000"

  producer:
    build:
      context: .
      dockerfile: api_engine/Dockerfile
    container_name: fraud_producer
    command: ["python", "kafka/producer.py"]
    volumes:
      - ./data:/app/data
    depends_on:
      - kafka
    environment:
      - PYTHONPATH=/app

  consumer:
    build:
      context: .
      dockerfile: api_engine/Dockerfile
    container_name: fraud_consumer
    command: ["python", "kafka/consumer.py"]
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - kafka
    environment:
      - PYTHONPATH=/app