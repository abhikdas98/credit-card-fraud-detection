name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # 4️⃣ Run basic checks (optional)
    - name: Run basic checks
      run: |
        python -m py_compile $(git ls-files '*.py')

    # 5️⃣ Build Docker images (CI validation)
    - name: Build Docker images
      run: |
        docker build -f api_engine/Dockerfile -t fraud-api .
        docker build -f app_ui/Dockerfile -t fraud-ui .

    # 6️⃣ Deploy to EC2 via SSH
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd credit-card-fraud-detection-project

          git pull origin main

          docker-compose down
          docker-compose up --build -d